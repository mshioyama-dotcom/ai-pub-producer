<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle売れる本診断</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #243d5c;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --white: #ffffff;
    --gray-light: #f4f6f9;
    --gray: #8a9ab0;
    --text: #1a2a3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--gray-light);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--navy);
    padding: 28px 20px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(201,168,76,0.12);
  }

  .header-label {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .header h1 {
    color: var(--white);
    font-size: 22px;
    font-weight: 900;
    line-height: 1.45;
    letter-spacing: 0.02em;
  }

  .header h1 span {
    color: var(--gold-light);
  }

  .header-sub {
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    margin-top: 10px;
    line-height: 1.6;
  }

  .progress-wrap {
    background: var(--white);
    padding: 16px 20px;
    border-bottom: 1px solid #e4eaf2;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 8px;
    font-weight: 500;
  }

  .progress-bar {
    height: 5px;
    background: #dde4ee;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy), var(--gold));
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 16px 48px;
  }

  .card {
    background: var(--white);
    border-radius: 16px;
    padding: 28px 24px;
    box-shadow: 0 2px 16px rgba(36,61,92,0.08);
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.12em;
    margin-bottom: 10px;
  }

  .q-text {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .q-hint {
    font-size: 12px;
    color: var(--gray);
    margin-bottom: 22px;
    line-height: 1.6;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    border: 2px solid #dde4ee;
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    color: var(--text);
    background: var(--white);
    text-align: left;
    transition: all 0.2s;
    position: relative;
  }

  .option:hover {
    border-color: var(--navy);
    background: #f0f4f9;
  }

  .option.selected {
    border-color: var(--navy);
    background: #eef3f9;
    color: var(--navy);
    font-weight: 700;
  }

  .option.selected::after {
    content: '✓';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-weight: 900;
    font-size: 15px;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    gap: 12px;
  }

  .btn-back {
    background: none;
    border: 2px solid #dde4ee;
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 700;
    color: var(--gray);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .btn-back:hover { border-color: var(--navy); color: var(--navy); }

  .btn-next {
    flex: 1;
    background: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }

  .btn-next:hover { background: #1a2e47; }
  .btn-next:disabled { background: #c0ccd8; cursor: not-allowed; }

  /* 結果画面 */
  .result-card {
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(36,61,92,0.08);
    animation: fadeUp 0.4s ease forwards;
  }

  .result-header {
    background: var(--navy);
    padding: 28px 24px;
    text-align: center;
  }

  .result-label {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  .result-score-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .result-score {
    font-size: 52px;
    font-weight: 900;
    color: var(--gold-light);
    line-height: 1;
  }

  .result-score-max {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
    align-self: flex-end;
    margin-bottom: 8px;
  }

  .result-rank {
    font-size: 20px;
    font-weight: 900;
    color: var(--white);
    letter-spacing: 0.04em;
  }

  .result-body {
    padding: 24px;
  }

  .result-summary {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 20px;
  }

  .result-items {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
  }

  .result-item.ok { background: #eef6f0; color: #2a6640; }
  .result-item.warn { background: #fff8ec; color: #7a5a00; }
  .result-item.ng { background: #fdf0f0; color: #7a2020; }

  .result-item-icon { font-size: 15px; margin-top: 1px; flex-shrink: 0; }

  .divider {
    height: 1px;
    background: #e4eaf2;
    margin: 20px 0;
  }

  .cta-box {
    background: linear-gradient(135deg, var(--navy) 0%, #1a2e47 100%);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
  }

  .cta-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .cta-title {
    color: var(--white);
    font-size: 17px;
    font-weight: 900;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .cta-title span { color: var(--gold-light); }

  .cta-desc {
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .cta-limit {
    display: inline-block;
    background: rgba(201,168,76,0.2);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 12px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
  }

  .btn-cta {
    display: block;
    background: var(--gold);
    color: var(--navy);
    font-size: 16px;
    font-weight: 900;
    padding: 16px 20px;
    border-radius: 12px;
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: all 0.2s;
    border: none;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
  }

  .btn-cta:hover { background: var(--gold-light); transform: translateY(-1px); }

  .cta-note {
    color: rgba(255,255,255,0.45);
    font-size: 11px;
    margin-top: 10px;
  }


  .advice-header {
    font-size: 13px;
    font-weight: 700;
    color: #243d5c;
    letter-spacing: 0.04em;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid #243d5c;
  }
  .advice-steps {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .advice-item {
    background: #f0f4f9;
    border-left: 4px solid #243d5c;
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
  }
  .advice-step-label {
    font-size: 12px;
    font-weight: 700;
    color: #243d5c;
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  .advice-step-text {
    font-size: 13px;
    color: #444;
    line-height: 1.75;
  }
  .retry-btn {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--gray);
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    font-family: inherit;
    width: 100%;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">無料診断ツール</div>
  <h1>次のKindle本を<br><span>「売れる本」</span>にする<br>5つのチェック</h1>
  <p class="header-sub">Kindle中級者向け ・ 所要時間2分</p>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-label">
    <span id="progressText">質問 1 / 5</span>
    <span id="progressPct">20%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:20%"></div>
  </div>
</div>

<div class="container">
  <div id="quizArea"></div>
</div>

<script>
const questions = [
  {
    id: 1,
    text: "企画中のテーマは、「自分が語れる」だけでなく「読者が求めている」という根拠がありますか？",
    hint: "Amazonの売れ筋・検索需要・口コミなどで確認できているか",
    options: [
      { text: "データや根拠を確認して決めた", score: 2 },
      { text: "なんとなく需要がありそうだと思って決めた", score: 1 },
      { text: "まだ確認していない", score: 0 },
    ]
  },
  {
    id: 2,
    text: "そのテーマで、すでにAmazonに競合本はありますか？",
    hint: "競合がいることは悪くない。ただし「強すぎる競合」への対策があるかが重要",
    options: [
      { text: "競合はいるが、自分の切り口で差別化できると思う", score: 2 },
      { text: "競合がいるが、差別化はまだ考えていない", score: 1 },
      { text: "競合がいない（需要がない可能性も含む）", score: 0 },
    ]
  },
  {
    id: 3,
    text: "「誰のために書くか」が一人に絞れていますか？",
    hint: "ターゲットが広すぎると刺さらない。具体的な一人をイメージできているか",
    options: [
      { text: "具体的な一人の読者像がはっきりイメージできている", score: 2 },
      { text: "なんとなくのターゲット層はあるが一人には絞れていない", score: 1 },
      { text: "できるだけ多くの人に読んでほしいと思っている", score: 0 },
    ]
  },
  {
    id: 4,
    text: "タイトルに「誰向けか」または「何が得られるか」が入っていますか？",
    hint: "読者はタイトルで0.3秒で判断する。検索にも影響する",
    options: [
      { text: "両方入っている、または強いキーワードで設計している", score: 2 },
      { text: "どちらか一方は入っている", score: 1 },
      { text: "まだタイトルは決めていない、またはセンス重視で決めた", score: 0 },
    ]
  },
  {
    id: 5,
    text: "出版後の販売促進（レビュー獲得・SNS告知・メルマガ配信など）について、具体的な計画がありますか？",
    hint: "出版だけでは売れない。初動の販促が売上を大きく左右する",
    options: [
      { text: "具体的な計画がある", score: 2 },
      { text: "なんとなくやろうとは思っているが計画はない", score: 1 },
      { text: "特に考えていない", score: 0 },
    ]
  }
];

const results = [
  {
    min: 0, max: 3,
    rank: "要見直し",
    summary: "テーマ・ターゲット・タイトルの設計に見直すべき点が複数あります。今の状態で出版しても売上につながりにくいため、テーマ選びから見直すことが大切です。",
    items: [
      { type: "ng", text: "市場ニーズの確認が不足しています" },
      { type: "ng", text: "ターゲットが曖昧で、内容が刺さりにくい状態です" },
      { type: "warn", text: "販促計画が不十分です" },
    ],
    advice: [
      { step: "STEP1", label: "テーマ発見インタビュー", text: "今のテーマに縛られず、幅広くキーワード候補を出してみてください。AIとの対話で「気になる2語」を見つけ直すところから始めましょう。" },
      { step: "STEP2", label: "市場勝率診断", text: "Amazonの実データで市場を診断します。勝率が低ければテーマを変えてSTEP1からやり直せます。データを見てからテーマを確定してください。" },
      { step: "STEP3", label: "読者・価値設計", text: "ターゲット読者を一人に絞り込みます。「誰のために書くか」を明確にすることで、内容の刺さり方が大きく変わります。" },
    ],
    ctaLabel: "STEP1から無料で始める →"
  },
  {
    min: 4, max: 7,
    rank: "あと一歩",
    summary: "基本的な方向性は悪くありません。あと1〜2箇所を改善するだけで売上の伸びしろが大きく変わります。データで裏付けを取りながら精度を上げましょう。",
    items: [
      { type: "ok", text: "一部の設計はしっかりできています" },
      { type: "warn", text: "ターゲットをさらに絞り込む余地があります" },
      { type: "warn", text: "市場データで差別化の切り口を確認できていません" },
    ],
    advice: [
      { step: "STEP1", label: "テーマ発見インタビュー", text: "現在のテーマで進めてOKです。ただし「気になる2語」をデータで確認するためにSTEP1を通してみてください。" },
      { step: "STEP2", label: "市場勝率診断", text: "ここが最重要です。Amazonの競合データを丁寧に見て、自分の切り口で差別化できるかを確認してください。" },
      { step: "STEP3", label: "読者・価値設計", text: "ターゲット読者をさらに一人に絞り込みます。章構造も自動で設計されるので、抜けがないか確認してください。" },
    ],
    ctaLabel: "STEP1から無料で確認してみる →"
  },
  {
    min: 8, max: 10,
    rank: "準備OK",
    summary: "売れる本にするための基本設計はできています。あとはデータで裏付けを取り、精度をさらに上げる段階です。",
    items: [
      { type: "ok", text: "市場ニーズの確認ができています" },
      { type: "ok", text: "ターゲット設定の方向性は整っています" },
      { type: "warn", text: "データで裏付けを取るとさらに確実になります" },
    ],
    advice: [
      { step: "STEP1", label: "テーマ発見インタビュー", text: "現在のテーマでそのまま進めてください。AIとの対話で検索キーワードを2語に絞り込みます。" },
      { step: "STEP2", label: "市場勝率診断", text: "Amazonの実データで設計の裏付けを取ります。勝率が高ければ自信を持って進められます。差別化の切り口も確認しておきましょう。" },
      { step: "STEP3", label: "読者・価値設計", text: "AIが章構造まで自動設計します。現在の設計と比較して、抜けているポイントがないか確認してください。" },
    ],
    ctaLabel: "STEP1〜3を無料で体験する →"
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let scores = new Array(questions.length).fill(0);

function updateProgress(step) {
  const pct = Math.round(((step + 1) / questions.length) * 100);
  document.getElementById('progressText').textContent = `質問 ${step + 1} / ${questions.length}`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderQuestion(index) {
  updateProgress(index);
  const q = questions[index];
  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="card">
      <div class="q-number">QUESTION ${q.id} / ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-hint">${q.hint}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option ${answers[index] === i ? 'selected' : ''}" onclick="selectOption(${index}, ${i}, ${opt.score})">
            ${opt.text}
          </button>
        `).join('')}
      </div>
      <div class="nav">
        ${index > 0 ? `<button class="btn-back" onclick="goBack()">← 戻る</button>` : ''}
        <button class="btn-next" id="btnNext" onclick="goNext()" ${answers[index] === null ? 'disabled' : ''}>
          ${index < questions.length - 1 ? '次の質問 →' : '診断結果を見る'}
        </button>
      </div>
    </div>
  `;
}

function selectOption(qIndex, optIndex, score) {
  answers[qIndex] = optIndex;
  scores[qIndex] = score;
  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.toggle('selected', i === optIndex);
  });
  document.getElementById('btnNext').disabled = false;
}

function goNext() {
  if (answers[current] === null) return;
  if (current < questions.length - 1) {
    current++;
    renderQuestion(current);
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) {
    current--;
    renderQuestion(current);
  }
}

function showResult() {
  const total = scores.reduce((a, b) => a + b, 0);
  const result = results.find(r => total >= r.min && total <= r.max);

  document.getElementById('progressWrap').style.display = 'none';

  const area = document.getElementById('quizArea');
  area.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-label">診断結果</div>
        <div class="result-score-wrap">
          <div class="result-score">${total}</div>
          <div class="result-score-max">/ 10点</div>
        </div>
        <div class="result-rank">${result.rank}</div>
      </div>
      <div class="result-body">
        <p class="result-summary">${result.summary}</p>
        <div class="result-items">
          ${result.items.map(item => `
            <div class="result-item ${item.type}">
              <span class="result-item-icon">${item.type === 'ok' ? '✅' : item.type === 'warn' ? '⚠️' : '❌'}</span>
              <span>${item.text}</span>
            </div>
          `).join('')}
        </div>
        <div class="divider"></div>
        <div class="advice-header">AI出版プロデューサー無料体験（STEP1〜3）の使い方</div>
        <div class="advice-steps">
          ${result.advice.map(a => `
            <div class="advice-item">
              <div class="advice-step-label">${a.step}｜${a.label}</div>
              <div class="advice-step-text">${a.text}</div>
            </div>
          `).join('')}
        </div>
        <div class="cta-box">
          <div class="cta-badge">無料体験のご案内</div>
          <div class="cta-limit">🔥 5名限定 ・ 5月2日（金）まで</div>
          <a href="https://ai-pub-producer.vercel.app/?trial=true" class="btn-cta">${result.ctaLabel}</a>
          <p class="cta-note">完全無料・申込後すぐにご案内します</p>
        </div>
        <button class="retry-btn" onclick="resetQuiz()">もう一度診断する</button>
      </div>
    </div>
  `;
}

function resetQuiz() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  scores = new Array(questions.length).fill(0);
  document.getElementById('progressWrap').style.display = 'block';
  renderQuestion(0);
}

renderQuestion(0);
</script>
</body>
</html>
