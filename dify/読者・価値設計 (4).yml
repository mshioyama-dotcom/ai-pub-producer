    - data:
        code: "import re\nfrom typing import List, Dict, Any\n\n# ============================================================\n\
          # 1) ユーティリティ関数\n# ============================================================\n\
          def _pick_block(text: str, label: str) -> str:\n    \"\"\"【label】の直後から、次の【見出し】or\
          \ 罫線 or 枠線までを取得\"\"\"\n    sep = r'[─━—–\\-―]{3,}'\n    frame = r'[┌├└]'\n\
          \    end = rf'(?=\\n\\s*【|\\n\\s*{sep}|\\n\\s*{frame}|$)'\n\n    pattern\
          \ = rf'【\\s*{re.escape(label)}\\s*(?:（[^）]*）)?\\s*】\\s*\\n?([\\s\\S]*?){end}'\n\
          \    m = re.search(pattern, text)\n    if not m:\n        return \"\"\n\
          \    content = m.group(1).strip()\n    return re.sub(r'^[\\s↓▼▽]+|[\\s↓▲△]+$',\
          \ '', content).strip()\n\n\ndef _pick_inline(text: str, label: str) -> str:\n\
          \    \"\"\"[label] の直後のテキストを1行取得\"\"\"\n    pattern = rf\"\\[\\s*{re.escape(label)}\\\
          s*\\]\\s*(.*)\"\n    m = re.search(pattern, text)\n    if not m:\n     \
          \   return \"\"\n    return m.group(1).strip()\n\n\ndef main(draft_text:\
          \ str, **kwargs) -> Dict[str, Any]:\n    text = draft_text or \"\"\n\n \
          \   # --- 検索ワード ---\n    kw = _pick_block(text, \"検索ワード\")\n\n    # ---\
          \ 検索意図 ---\n    it_lock = _pick_block(text, \"検索意図（固定）\")\n    if not it_lock:\n\
          \        it_lock = _pick_block(text, \"検索意図\")\n\n    # --- 読者への提供価値（現在地\
          \ / 詰まり / 到達点） ---\n    value_block = _pick_block(text, \"読者への提供価値\")\n\
          \    bf = _pick_inline(value_block, \"現在地\") if value_block else \"\"\n\
          \    cp = _pick_inline(value_block, \"詰まり\") if value_block else \"\"\n\
          \    af = _pick_inline(value_block, \"到達点\") if value_block else \"\"\n\n\
          \    # 旧フォーマットへのフォールバック\n    if not bf:\n        bf = _pick_block(text,\
          \ \"読者の現在地（Before）\")\n    if not cp:\n        cp = _pick_block(text, \"\
          構造的な詰まり（Core Problem）\")\n    if not af:\n        af = _pick_block(text,\
          \ \"到達状態（After）\")\n\n    # --- 心理ポイント ---\n    ps = _pick_block(text, \"\
          心理ポイント\")\n\n    # --- 章構造 ---\n    ch = _pick_block(text, \"章構造\")\n\n\
          \    # 章タイトルの整形（章数可変対応）\n    raw_ch_lines = [l.strip() for l in ch.splitlines()\
          \ if \"｜\" in l or \"|\" in l]\n    final_ch = []\n\n    for line in raw_ch_lines:\n\
          \        parts = re.split(r'[｜|]', line, maxsplit=1)\n        title = parts[1].strip()\
          \ if len(parts) > 1 else line.strip()\n        if title:\n            final_ch.append(title)\n\
          \n    chapter_count = len(final_ch)\n\n    # ============================================================\n\
          \    # 2) レポート組み立て\n    # ============================================================\n\
          \    report = [\n        \"┌────────────────────────────┐\",\n        \"\
          │          読者・価値設計          │\",\n        \"├────────────────────────────┤\"\
          ,\n        \"\",\n        f\"【検索ワード】\\n{kw}\",\n        \"\",\n        \"\
          ──────────────────────\",\n        \"\",\n        f\"【検索意図（固定）】\\n{it_lock}\"\
          ,\n        \"\",\n        \"──────────────────────\",\n        \"\",\n \
          \       \"【読者への提供価値】\",\n        f\" [現在地] {bf}\",\n        \"    ↓\",\n\
          \        f\" [詰まり] {cp}\",\n        \"    ↓\",\n        f\" [到達点] {af}\"\
          ,\n        \"\",\n        \"──────────────────────\",\n        \"\",\n \
          \       f\"【心理ポイント】\\n{ps}\",\n        \"\",\n        \"──────────────────────\"\
          ,\n        \"\",\n        f\"【章構造（{chapter_count}章構成）】\",\n        \"\"\
          ,\n        *[f\"{i+1}｜{final_ch[i]}\" for i in range(chapter_count)],\n\
          \        \"\",\n        \"└────────────────────────────┘\"\n    ]\n\n  \
          \  return {\n        \"structure_report\": \"\\n\".join(report),\n     \
          \   \"chapter_skeleton\": final_ch\n    }"
        code_language: python3
