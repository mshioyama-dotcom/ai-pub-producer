    - data:
        code: "import re\n\ndef main(\n    analysis_text,\n    formatted_list,\n \
          \   keyword1,\n    keyword2,\n    overall_result,\n    overall_comment,\n\
          \    ranking_summary,\n    review_label,\n    **kwargs\n):\n    # --- 1.\
          \ LLM解析テキストのパース ---\n    text = str(analysis_text).strip()\n\n    intent_match\
          \ = re.search(r\"【検索意図の仮説】\\s*(.*?)(?=【[^】]+】|$)\", text, re.DOTALL)\n \
          \   intent_content = intent_match.group(1).strip() if intent_match else\
          \ \"意図を分析中...\"\n\n    overview_text = re.sub(r\"【検索意図の仮説】\\s*.*?(?=【[^】]+】|$)\"\
          , \"\", text, flags=re.DOTALL).strip()\n\n    overview_text = re.sub(r\"\
          \\n{3,}\", \"\\n\\n\", overview_text).strip()\n    intent_content = re.sub(r\"\
          \\n{3,}\", \"\\n\\n\", intent_content).strip()\n\n    # --- 2. 書籍リストのパース\
          \ ---\n    input_list = str(formatted_list) if formatted_list else str(kwargs.get(\"\
          book_table\", \"\"))\n    items = [i for i in input_list.split(\"- タイトル:\"\
          ) if i.strip()]\n\n    rows = [\"| 順位 | タイトル | レビュー数 | リンク |\", \"| :---\
          \ | :--- | :--- | :--- |\"]\n\n    for item in items:\n        title_m =\
          \ re.search(r\"^(.*)\", item.strip())\n        title = title_m.group(1).strip()\
          \ if title_m else \"タイトル不明\"\n\n        rank_m = re.search(r\"ランキング[:：]\\\
          s*(.*)\", item)\n        rank_str = rank_m.group(1).strip() if rank_m else\
          \ \"不明\"\n\n        review_m = re.search(r\"レビュー数[:：]\\s*(.*)\", item)\n\
          \        review_str = review_m.group(1).strip() if review_m else \"不明\"\n\
          \n        url_m = re.search(r\"(https?://[^\\s]+)\", item)\n        url\
          \ = url_m.group(1).strip() if url_m else \"#\"\n\n        display_title\
          \ = (title[:40] + \"..\") if len(title) > 40 else title\n        rows.append(f\"\
          | {rank_str} | {display_title} | {review_str} | [Amazon]({url}) |\")\n\n\
          \    table_md = \"\\n\".join(rows)\n    book_count = len(items)\n\n    #\
          \ --- 3. 判定文言の整形 ---\n    final_result = str(overall_result).strip()\n \
          \   final_comment = str(overall_comment).strip()\n\n    if \"判定保留\" in final_result:\n\
          \        if \"レビュー取得不足\" in final_result:\n            final_result = \"\
          判定保留\"\n            final_comment = (\n                f\"競合を{book_count}件確認しましたが、レビュー件数の取得が十分でないため、\"\
          \n                \"レビュー評価と総合評価は暫定扱いです。Keepaのレビュー取得状況を確認してください。\"\n    \
          \        )\n        elif \"抽出不足\" in final_result:\n            final_result\
          \ = \"判定保留\"\n            final_comment = (\n                f\"競合を{book_count}件確認しましたが、抽出件数が少ないため、\"\
          \n                \"総合評価は暫定扱いです。再検索またはキーワード見直しを推奨します。\"\n            )\n\
          \        else:\n            final_result = \"判定保留\"\n            final_comment\
          \ = (\n                f\"競合を{book_count}件確認しましたが、評価に必要な情報が不足しているため、\"\n\
          \                \"総合評価は暫定扱いです。\"\n            )\n\n    # --- 4. レポート組み立て\
          \ ---\n    report = f\"# \U0001F9E0 市場分析レポート: {keyword1} × {keyword2}\\\
          n\\n\"\n    report += \"## \U0001F4CA 評価結果\\n\"\n    report += f\"> **✅\
          \ 総合評価:** {final_result}\\n\"\n    report += f\"> **\U0001F680 結論:** {final_comment}\\\
          n\\n\"\n\n    report += \"### \U0001F4DD 市場概況・戦略分析\\n\"\n    report += f\"\
          {overview_text}\\n\\n\"\n\n    report += \"---\\n\"\n    report += \"###\
          \ \U0001F3AF 検索者の意図（仮説）\\n\"\n    report += f\"{intent_content}\\n\\n\"\n\
          \n    report += \"---\\n\"\n    report += f\"## \U0001F4DA 主要な競合本（全{book_count}件）\\\
          n\\n\"\n    report += f\"{table_md}\\n\"\n\n    return {\"final_report\"\
          : report}"
