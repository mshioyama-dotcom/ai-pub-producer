          \ for b in str(top10_list).split(\"■ASIN:\") if b.strip()]\n    formatted_results\
          \ = []\n\n    for block in blocks:\n        asin_m = re.search(r\"([A-Z0-9]{10})\"\
          , block)\n        asin = asin_m.group(1) if asin_m else \"不明\"\n\n     \
          \   title_m = re.search(r\"タイトル[:：]\\s*(.*)\", block)\n        title = title_m.group(1).split(\"\
          \\n\")[0].strip() if title_m else \"タイトル不明\"\n\n        rank_m = re.search(r\"\
          全体順位[:：]\\s*(\\d+)\", block.replace(\",\", \"\"))\n        rank_str = f\"\
          {int(rank_m.group(1)):,}位\" if rank_m else \"不明\"\n\n        review_m =\
          \ re.search(r\"レビュー数[:：]\\s*(\\d+)\", block.replace(\",\", \"\"))\n    \
          \    review_str = f\"{int(review_m.group(1)):,}件\" if review_m else \"不明\"\
          \n\n        formatted_results.append(\n            f\"- タイトル: {title}\\\
