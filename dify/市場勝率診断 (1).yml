    - data:
        code: "import json\nfrom typing import Any, Dict, List, Optional\n\n\ndef\
          \ safe_json_loads(value: Any) -> Any:\n    if isinstance(value, str):\n\
          \        value = value.strip()\n        if not value:\n            return\
          \ {}\n        try:\n            return json.loads(value)\n        except\
          \ Exception:\n            return {}\n    return value\n\n\ndef safe_int(value:\
          \ Any) -> Optional[int]:\n    try:\n        if value is None or isinstance(value,\
          \ bool):\n            return None\n        return int(float(value))\n  \
          \  except Exception:\n        return None\n\n\ndef pick_latest_rank_from_history(history:\
          \ Any) -> Optional[int]:\n    history = safe_json_loads(history)\n    if\
          \ not isinstance(history, list) or not history:\n        return None\n\n\
          \    for v in reversed(history):\n        iv = safe_int(v)\n        if iv\
          \ is not None and iv > 0:\n            return iv\n    return None\n\n\n\
          def pick_latest_count_from_history(history: Any) -> Optional[int]:\n   \
          \ history = safe_json_loads(history)\n    if not isinstance(history, list)\
          \ or not history:\n        return None\n\n    for v in reversed(history):\n\
          \        iv = safe_int(v)\n        if iv is not None and iv >= 0:\n    \
          \        return iv\n    return None\n\n\ndef is_book_product(product: Dict[str,\
          \ Any]) -> bool:\n    \"\"\"\n    書籍（紙・Kindle）かどうかを判定する。\n    書籍以外の商品（家電、PC等）を除外するために使用。\n\
          \    \"\"\"\n    if not isinstance(product, dict):\n        return False\n\
          \n    # 1. productGroup で判定（最も確実）\n    product_group = str(product.get(\"\
          productGroup\", \"\")).strip().lower()\n    book_groups = {\"book\", \"\
          ebook\", \"digital_ebook_purchase\", \"ebooks\", \"abis_book\"}\n    if\
          \ product_group and product_group in book_groups:\n        return True\n\
          \n    # 2. categoryTree で判定（productGroupがない場合のフォールバック）\n    category_tree\
          \ = product.get(\"categoryTree\")\n    if isinstance(category_tree, list):\n\
          \        for cat in category_tree:\n            if isinstance(cat, dict):\n\
          \                cat_name = str(cat.get(\"name\", \"\")).strip()\n     \
          \           if cat_name in (\"本\", \"Kindle本\", \"Kindleストア\", \"洋書\", \"\
          雑誌\"):\n                    return True\n\n    # 3. rootCategory で判定（さらにフォールバック）\n\
          \    root_cat = safe_int(product.get(\"rootCategory\"))\n    # amazon.co.jp\
          \ の書籍系rootCategory ID\n    book_root_cats = {\n        465392,      # 本\n\
          \        2250738051,  # Kindleストア\n        86137051,    # 洋書\n    }\n  \
          \  if root_cat is not None and root_cat in book_root_cats:\n        return\
          \ True\n\n    # 4. binding（形態）で判定（最終フォールバック）\n    binding = str(product.get(\"\
          binding\", \"\")).strip()\n    book_bindings = {\"単行本\", \"文庫\", \"新書\"\
          , \"ハードカバー\", \"Kindle版\", \"Kindle Edition\",\n                     \"\
          ペーパーバック\", \"Paperback\", \"Hardcover\", \"単行本（ソフトカバー）\",\n            \
          \         \"大型本\", \"オンデマンド\"}\n    if binding and binding in book_bindings:\n\
          \        return True\n\n    # productGroupもcategoryTreeもrootCategoryもbindingも判定できない場合\n\
          \    # → 安全のため書籍として扱う（情報不足で除外するより、含める方がリスクが低い）\n    if not product_group\
          \ and not category_tree and root_cat is None and not binding:\n        return\
          \ True\n\n    return False\n\n\ndef extract_sales_rank(product: Dict[str,\
          \ Any]) -> Optional[int]:\n    \"\"\"\n    書籍の全体順位を取得する。\n\n    優先順:\n \
          \   1. stats.current[3]\n    2. csv[3]\n    3. salesRanks / salesRankReference\
          \ を補助的に参照\n    \"\"\"\n    if not isinstance(product, dict):\n        return\
          \ None\n\n    # 1. stats.current[3]\n    stats = safe_json_loads(product.get(\"\
          stats\", {}))\n    if isinstance(stats, dict):\n        current = stats.get(\"\
          current\")\n        if isinstance(current, list) and len(current) > 3:\n\
          \            val = safe_int(current[3])\n            if val is not None\
          \ and val > 0:\n                return val\n\n    # 2. csv[3]\n    csv_data\
          \ = safe_json_loads(product.get(\"csv\", []))\n    if isinstance(csv_data,\
          \ list) and len(csv_data) > 3:\n        val = pick_latest_rank_from_history(csv_data[3])\n\
          \        if val is not None:\n            return val\n\n    # 3. 補助的に salesRanks\
          \ / salesRankReference\n    sales_ranks = safe_json_loads(product.get(\"\
          salesRanks\", {}))\n    sales_rank_reference = product.get(\"salesRankReference\"\
          )\n\n    if isinstance(sales_ranks, dict) and sales_rank_reference is not\
          \ None:\n        ref_key = str(sales_rank_reference).strip()\n        if\
          \ ref_key in sales_ranks:\n            val = pick_latest_rank_from_history(sales_ranks.get(ref_key))\n\
          \            if val is not None:\n                return val\n\n    return\
          \ None\n\n\ndef extract_review_count(product: Dict[str, Any]) -> Optional[int]:\n\
          \    \"\"\"\n    レビュー件数取得。\n\n    優先順:\n    1. stats.current[17]\n    2.\
          \ csv[17]\n    3. direct / nested keys\n    4. variationCSV\n    \"\"\"\n\
          \    if not isinstance(product, dict):\n        return None\n\n    # 1.\
          \ stats.current[17]\n    stats = safe_json_loads(product.get(\"stats\",\
          \ {}))\n    if isinstance(stats, dict):\n        current = stats.get(\"\
          current\")\n        if isinstance(current, list) and len(current) > 17:\n\
          \            val = safe_int(current[17])\n            if val is not None\
          \ and val >= 0:\n                return val\n\n    # 2. csv[17]\n    csv_data\
          \ = safe_json_loads(product.get(\"csv\", []))\n    if isinstance(csv_data,\
          \ list) and len(csv_data) > 17:\n        review_count = pick_latest_count_from_history(csv_data[17])\n\
          \        if review_count is not None:\n            return review_count\n\
          \n    # 3. direct keys\n    direct_keys = [\n        \"reviewCount\", \"\
          reviewsCount\", \"review_count\", \"reviews_count\",\n        \"ratingCount\"\
          , \"ratingsCount\"\n    ]\n    for key in direct_keys:\n        val = safe_int(product.get(key))\n\
          \        if val is not None and val >= 0:\n            return val\n\n  \
          \  # 4. nested keys\n    nested_sources = [\"reviews\", \"review\", \"stats\"\
          , \"offers\"]\n    nested_keys = [\n        \"reviewCount\", \"reviewsCount\"\
          , \"ratingCount\", \"ratingsCount\",\n        \"count\", \"totalReviewCount\"\
          , \"totalReviews\"\n    ]\n    for source in nested_sources:\n        obj\
          \ = product.get(source)\n        if isinstance(obj, dict):\n           \
          \ for key in nested_keys:\n                val = safe_int(obj.get(key))\n\
          \                if val is not None and val >= 0:\n                    return\
          \ val\n\n    # 5. variationCSV\n    variation_csv = safe_json_loads(product.get(\"\
          variationCSV\"))\n    if isinstance(variation_csv, list) and len(variation_csv)\
          \ > 1:\n        maybe_reviews = variation_csv[1]\n        if isinstance(maybe_reviews,\
          \ list):\n            review_count = pick_latest_count_from_history(maybe_reviews)\n\
          \            if review_count is not None:\n                return review_count\n\
          \n    return None\n\n\ndef format_int_or_unknown(value: Optional[int]) ->\
          \ str:\n    return \"不明\" if value is None else f\"{value:,}\"\n\n\ndef\
          \ main(keepa_response: str) -> Dict[str, Any]:\n    try:\n        data =\
          \ safe_json_loads(keepa_response)\n\n        body = data.get(\"body\", data)\
          \ if isinstance(data, dict) else data\n        body = safe_json_loads(body)\n\
          \n        if isinstance(body, dict) and \"error\" in body:\n           \
          \ error_obj = body.get(\"error\", {})\n            msg = error_obj.get(\"\
          message\", \"Unknown Keepa error\")\n            return {\n            \
          \    \"top10_list\": f\"Keepaエラー: {msg}\"\n            }\n\n        products\
          \ = body.get(\"products\", []) if isinstance(body, dict) else []\n     \
          \   if not isinstance(products, list):\n            products = []\n\n  \
          \      valid_products: List[Dict[str, Any]] = []\n\n        for product\
          \ in products:\n            if not isinstance(product, dict):\n        \
          \        continue\n\n            # 書籍以外の商品を除外\n            if not is_book_product(product):\n\
          \                continue\n\n            title = product.get(\"title\")\
          \ or \"タイトル不明\"\n            asin = product.get(\"asin\") or \"\"\n    \
          \        sales_rank = extract_sales_rank(product)\n            review_count\
          \ = extract_review_count(product)\n\n            if sales_rank is None:\n\
          \                continue\n\n            valid_products.append({\n     \
          \           \"asin\": asin,\n                \"title\": title,\n       \
          \         \"sales_rank\": sales_rank,\n                \"review_count\"\
          : review_count,\n            })\n\n        valid_products = sorted(valid_products,\
          \ key=lambda x: x[\"sales_rank\"])[:10]\n\n        if not valid_products:\n\
          \            return {\n                \"top10_list\": \"書籍候補が取得できませんでした\"\
          \n            }\n\n        lines = []\n        for item in valid_products:\n\
