    - data:
        code: "def main(arg1, arg2, arg3, arg4, arg5):\n    \"\"\"\n    総合評価ノード v3.0\n\
          \    ランキング評価とレビュー評価を統合し、総合コメントを出す\n\n    arg1: review_score\n    arg2: review_strong_ratio\n\
          \    arg3: top10_count\n    arg4: ranking_score\n    arg5: review_label\n\
          \    \"\"\"\n\n    def to_float(v, default=0.0):\n        try:\n       \
          \     if v is None:\n                return default\n            s = str(v).strip()\n\
          \            return float(s) if s != \"\" else default\n        except:\n\
          \            return default\n\n    def to_int(v, default=0):\n        try:\n\
          \            if v is None:\n                return default\n           \
          \ s = str(v).strip()\n            return int(float(s)) if s != \"\" else\
          \ default\n        except:\n            return default\n\n    review_score\
          \ = to_float(arg1, 0.0)\n    review_strong_ratio = to_float(arg2, 0.0)\n\
          \    top10_count = to_int(arg3, 0)\n    ranking_score = to_float(arg4, 0.0)\n\
          \n    review_label_raw = \"\" if arg5 is None else str(arg5)\n    review_label\
          \ = review_label_raw.strip()\n\n    # 判定保留条件\n    if (\n        review_label\
          \ == \"\"\n        or review_label.lower() == \"no data\"\n        or review_label\
          \ == \"判定保留\"\n        or top10_count <= 3\n    ):\n        if top10_count\
          \ <= 3:\n            overall_result = \"判定保留（抽出不足）\"\n            overall_comment\
          \ = \"抽出件数が少ないため、総合評価を確定できません。再検索またはキーワード見直しを推奨します。\"\n        elif review_label\
          \ == \"判定保留\":\n            overall_result = \"判定保留（レビュー取得不足）\"\n      \
          \      overall_comment = \"レビュー件数の取得が十分でないため、総合評価を確定できません。レビュー取得状況を確認したうえで再判定してください。\"\
          \n        else:\n            overall_result = \"判定保留\"\n            overall_comment\
          \ = \"評価に必要な情報が不足しているため、総合評価を確定できません。\"\n\n        summary_text = f\"【総合評価】{overall_result}\\\
          n結論：{overall_comment}\"\n\n        return {\n            \"overall_result\"\
          : overall_result,\n            \"overall_comment\": overall_comment,\n \
          \           \"summary_text\": summary_text\n        }\n\n    # ランキング評価を3段階化\n\
          \    if ranking_score >= 58:\n        ranking_side = \"ランキング強\"\n    elif\
          \ ranking_score >= 36:\n        ranking_side = \"ランキング中間\"\n    else:\n\
          \        ranking_side = \"ランキング弱\"\n\n    # レビュー評価は現状の3段階ラベルをそのまま尊重\n  \
          \  if review_label == \"多い\":\n        review_side = \"レビュー多\"\n       \
          \ review_tone = \"（上位本のレビュー壁：厚い）\"\n    elif review_label == \"中間\":\n \
          \       review_side = \"レビュー中間\"\n        review_tone = \"（上位本のレビュー壁：中程度）\"\
          \n    elif review_label == \"少ない\":\n        review_side = \"レビュー少\"\n \
          \       review_tone = \"（上位本のレビュー壁：薄め）\"\n    else:\n        review_side\
          \ = \"レビュー不明\"\n        review_tone = \"（上位本のレビュー壁：判定補助情報なし）\"\n\n    overall_result\
          \ = f\"{ranking_side} × {review_side}\"\n\n    # コメント分岐\n    if overall_result\
          \ == \"ランキング強 × レビュー多\":\n        overall_comment = \"上位本のランキングは強く、レビューの壁も厚めです。売れ筋はある一方で、正面突破は厳しめです。切り口の差別化を推奨します。\"\
          \n\n    elif overall_result == \"ランキング強 × レビュー中間\":\n        overall_comment\
          \ = \"上位本のランキングは強く、市場需要は見込めます。レビュー壁は極端に厚いわけではないため、切り口設計次第で参入余地があります。\"\n\
          \n    elif overall_result == \"ランキング強 × レビュー少\":\n        overall_comment\
          \ = \"上位本のランキングは強く、レビューの壁は比較的薄めです。売れ筋がありつつ、入り込む余地もある有望な候補です。\"\n\n    elif\
          \ overall_result == \"ランキング中間 × レビュー多\":\n        overall_comment = \"一定の需要は見込める一方で、レビュー実績のある本が目立ちます。市場はあるものの、後発は訴求軸や対象読者を明確にした方が入りやすいです。\"\
          \n\n    elif overall_result == \"ランキング中間 × レビュー中間\":\n        overall_comment\
          \ = \"一定の需要があり、競合の壁も極端には偏っていません。広く取りに行くより、読者像や用途を絞った設計の方が勝ち筋を作りやすいです。\"\n\
          \n    elif overall_result == \"ランキング中間 × レビュー少\":\n        overall_comment\
          \ = \"需要は一定程度見込め、レビュー壁も比較的薄めです。ニッチ化や用途特化によって後発でも十分に検討できる候補です。\"\n\n    elif\
          \ overall_result == \"ランキング弱 × レビュー多\":\n        overall_comment = \"レビュー実績のある本は多い一方で、ランキングの勢いは弱めです。市場の鮮度や切り口の再設計を推奨します。\"\
          \n\n    elif overall_result == \"ランキング弱 × レビュー中間\":\n        overall_comment\
          \ = \"市場規模は大きくない一方で、一定の競合は存在します。広いテーマのままでは埋もれやすいため、用途や対象読者の絞り込みが重要です。\"\n\
          \n    else:\n        overall_comment = \"ランキングもレビュー壁も強くありません。ニッチ寄りのテーマとして、読者像や用途を絞ると検討しやすいです。\"\
          \n\n    sample_note = \"\"\n    if top10_count <= 5:\n        sample_note\
          \ = \"（抽出件数が少ないため暫定判定）\"\n\n    ratio_note = \"\"\n    if review_strong_ratio\
          \ > 0:\n        ratio_note = f\"\\n参考：レビュー30件超の上位本比率 {review_strong_ratio}%\"\
          \n\n    summary_text = (\n        f\"【総合評価】{overall_result}{sample_note}\\\
          n\"\n        f\"{review_tone}\\n\"\n        f\"結論：{overall_comment}{ratio_note}\"\
          \n    )\n\n    return {\n        \"overall_result\": overall_result,\n \
          \       \"overall_comment\": overall_comment,\n        \"summary_text\"\
          : summary_text\n    }"
