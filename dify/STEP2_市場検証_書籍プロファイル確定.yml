    - data:
        code: "import re\nimport statistics\n\ndef main(top10_list=\"\", **kwargs):\n\
          \    raw_data = str(top10_list)\n\n    ranks = []\n    reviews = []\n  \
          \  review_unknown_count = 0\n\n    for line in raw_data.splitlines():\n\
          \        line_clean = line.replace(\",\", \"\").strip()\n\n        m_rank\
          \ = re.search(r'^全体順位\\s*[:：]\\s*(\\d+)$', line_clean)\n        if m_rank:\n\
          \            ranks.append(int(m_rank.group(1)))\n            continue\n\n\
          \        m_review = re.search(r'^レビュー数\\s*[:：]\\s*(\\d+)$', line_clean)\n\
          \        if m_review:\n            reviews.append(int(m_review.group(1)))\n\
          \            continue\n\n        m_review_unknown = re.search(r'^レビュー数\\\
          s*[:：]\\s*(不明)$', line_clean)\n        if m_review_unknown:\n          \
          \  review_unknown_count += 1\n            continue\n\n    top10_count =\
          \ len(ranks)\n    review_available_count = len(reviews)\n\n    if top10_count\
          \ == 0:\n        return {\n            \"review_score\": 0,\n          \
          \  \"review_label\": \"No Data\",\n            \"review_strong_ratio\":\
          \ 0,\n            \"top10_count\": 0,\n            \"review_median\": 0,\n\
          \            \"rank_median\": 0,\n            \"c_le_10\": 0,\n        \
          \    \"c_le_30\": 0,\n            \"c_le_100\": 0,\n            \"c_gt_100\"\
          : 0\n        }\n\n    ranks.sort()\n    rank_median = statistics.median(ranks)\
          \ if ranks else 0\n\n    reviews = [r for r in reviews if isinstance(r,\
          \ int) and r >= 0]\n\n    # 取得件数が少なすぎる場合は保留\n    if review_available_count\
          \ < 4:\n        return {\n            \"review_score\": 0,\n           \
          \ \"review_label\": \"判定保留\",\n            \"review_strong_ratio\": 0,\n\
          \            \"top10_count\": top10_count,\n            \"review_median\"\
          : 0,\n            \"rank_median\": round(rank_median, 1),\n            \"\
          c_le_10\": 0,\n            \"c_le_30\": 0,\n            \"c_le_100\": 0,\n\
          \            \"c_gt_100\": 0\n        }\n\n    review_median = statistics.median(reviews)\n\
          \n    c_le_10 = len([r for r in reviews if r <= 10])\n    c_11_30 = len([r\
          \ for r in reviews if 10 < r <= 30])\n    c_31_100 = len([r for r in reviews\
          \ if 30 < r <= 100])\n    c_gt_100 = len([r for r in reviews if r > 100])\n\
          \n    c_le_30 = c_le_10 + c_11_30\n    c_le_100 = c_le_30 + c_31_100\n\n\
          \    def review_band_score(median_review):\n        if median_review > 100:\n\
          \            return 72\n        elif median_review > 30:\n            return\
          \ 52\n        elif median_review > 10:\n            return 32\n        else:\n\
          \            return 12\n\n    distribution_score = (\n        c_gt_100 *\
          \ 18 +\n        c_31_100 * 10 +\n        c_11_30 * 4\n    )\n\n    median_score\
          \ = review_band_score(review_median)\n\n    # レビュー評価はレビュー情報だけで決める\n    score_raw\
          \ = distribution_score + median_score\n\n    # 件数補正\n    if review_available_count\
          \ <= 3:\n        score_raw *= 0.78\n    elif review_available_count <= 5:\n\
          \        score_raw *= 0.88\n    elif review_available_count <= 7:\n    \
          \    score_raw *= 0.95\n\n    review_score = round(min(100, score_raw),\
          \ 1)\n\n    if review_score >= 70:\n        review_label = \"多い\"\n    elif\
          \ review_score >= 40:\n        review_label = \"中間\"\n    else:\n      \
          \  review_label = \"少ない\"\n\n    review_strong_ratio = round(\n        (len([r\
          \ for r in reviews if r > 30]) / review_available_count) * 100, 1\n    )\
          \ if review_available_count > 0 else 0.0\n\n    return {\n        \"review_score\"\
          : review_score,\n        \"review_label\": review_label,\n        \"review_strong_ratio\"\
          : review_strong_ratio,\n        \"top10_count\": top10_count,\n        \"\
          review_median\": round(review_median, 1),\n        \"rank_median\": round(rank_median,\
          \ 1),\n        \"c_le_10\": c_le_10,\n        \"c_le_30\": c_le_30,\n  \
          \      \"c_le_100\": c_le_100,\n        \"c_gt_100\": c_gt_100\n    }"
