    - data:
        code: "import re\nimport statistics\nimport math\n\ndef main(top10_list: str):\n\
          \    out = {\n        \"ranking_rank\": \"?\",\n        \"ranking_score\"\
          : 0,\n        \"ranking_emoji\": \"❓\",\n        \"ranking_summary\": \"\
          データなし\",\n        \"average_rank\": 0,\n        \"rank_median\": 0\n   \
          \ }\n\n    if not isinstance(top10_list, str) or not top10_list.strip():\n\
          \        return out\n\n    ranks = []\n\n    for line in top10_list.splitlines():\n\
          \        line_clean = line.replace(\",\", \"\").strip()\n\n        m_rank\
          \ = re.search(r'^全体順位\\s*[:：]\\s*(\\d+)$', line_clean)\n        if m_rank:\n\
          \            ranks.append(int(m_rank.group(1)))\n            continue\n\n\
          \    if not ranks:\n        return out\n\n    ranks.sort()\n    n = len(ranks)\n\
          \n    median_rank = statistics.median(ranks)\n    top3_avg = sum(ranks[:3])\
          \ / min(n, 3)\n    top5_avg = sum(ranks[:5]) / min(n, 5)\n    total_avg\
          \ = sum(ranks) / n\n\n    def calc_rank_score(rank):\n        upper, lower\
          \ = 1000, 100000\n        if rank <= upper:\n            return 100.0\n\
          \        if rank >= lower:\n            return 0.0\n        return (\n \
          \           (math.log10(lower) - math.log10(rank)) /\n            (math.log10(lower)\
          \ - math.log10(upper))\n        ) * 100.0\n\n    # 上位帯を少し重めに評価\n    rank_score_raw\
          \ = (\n        calc_rank_score(top3_avg) * 0.32 +\n        calc_rank_score(top5_avg)\
          \ * 0.28 +\n        calc_rank_score(median_rank) * 0.25 +\n        calc_rank_score(total_avg)\
          \ * 0.15\n    )\n\n    # 上位の強さに下駄を履かせる\n    if n >= 3:\n        if top3_avg\
          \ <= 3000:\n            rank_score_raw = max(rank_score_raw, 74.0)\n   \
          \     elif top3_avg <= 7000:\n            rank_score_raw = max(rank_score_raw,\
          \ 66.0)\n        elif top3_avg <= 10000:\n            rank_score_raw = max(rank_score_raw,\
          \ 60.0)\n\n    if n >= 5:\n        if top5_avg <= 10000:\n            rank_score_raw\
          \ = max(rank_score_raw, 62.0)\n        elif top5_avg <= 20000:\n       \
          \     rank_score_raw = max(rank_score_raw, 52.0)\n        elif top5_avg\
          \ <= 30000:\n            rank_score_raw = max(rank_score_raw, 44.0)\n\n\
          \    # 抽出件数補正\n    if n <= 3:\n        rank_score_raw *= 0.84\n    elif\
          \ n <= 5:\n        rank_score_raw *= 0.91\n    elif n <= 7:\n        rank_score_raw\
          \ *= 0.97\n\n    ranking_score = round(min(max(rank_score_raw, 0), 100),\
          \ 1)\n    note = f\"（抽出{n}件の暫定値）\" if n < 8 else \"\"\n\n    if ranking_score\
          \ >= 78:\n        r, e, s = \"S\", \"\U0001F48E\", f\"ランキング評価は非常に強い{note}\"\
          \n    elif ranking_score >= 58:\n        r, e, s = \"A\", \"\U0001F525\"\
          , f\"ランキング評価は強い{note}\"\n    elif ranking_score >= 36:\n        r, e, s\
          \ = \"B\", \"✅\", f\"ランキング評価は中間{note}\"\n    else:\n        r, e, s = \"\
          C\", \"\U0001F4A4\", f\"ランキング評価は弱め{note}\"\n\n    return {\n        \"ranking_rank\"\
          : r,\n        \"ranking_score\": ranking_score,\n        \"ranking_emoji\"\
          : e,\n        \"ranking_summary\": s,\n        \"average_rank\": round(total_avg,\
          \ 1),\n        \"rank_median\": round(median_rank, 1)\n    }"
        code_language: python3
