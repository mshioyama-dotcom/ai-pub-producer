    - data:
        code: "import re\n\ndef main(**kwargs):\n    html_content = str(kwargs.get(\"\
          html\", kwargs.get(\"amazon_url\", \"\")))\n\n    if not html_content.strip():\n\
          \        return {\n            \"asin_query\": \"\",\n            \"count\"\
          : 0\n        }\n\n    # エスケープを少し戻す\n    text = html_content.replace('\\\\\
          \"', '\"').replace(\"\\\\/\", \"/\")\n\n    # --- ASIN取得側フィルタ：スポンサー広告枠を除去してからASINを探す\
          \ ---\n    # スポンサー広告枠（AdHolder等）を除去\n    cleaned = re.sub(r'<div[^>]*class=\"\
          [^\"]*(?:AdHolder|ad-feedback|s-ad-feedback)[^\"]*\"[\\s\\S]*?</div>', '',\
          \ text, flags=re.IGNORECASE)\n\n    # まず検索結果ブロックの data-asin を最優先で取る\n  \
          \  primary_pattern = r'data-component-type=\"s-search-result\"[^>]*data-asin=\"\
          ([A-Za-z0-9]{10})\"|data-asin=\"([A-Za-z0-9]{10})\"[^>]*data-component-type=\"\
          s-search-result\"'\n    matches = re.findall(primary_pattern, cleaned, flags=re.IGNORECASE)\n\
          \n    found_asins = []\n    for m in matches:\n        asin = m[0] if m[0]\
          \ else m[1]\n        if asin:\n            found_asins.append(asin)\n\n\
          \    # 検索結果ブロックから取れなかった場合のみフォールバック\n    if not found_asins:\n        fallback_patterns\
          \ = [\n            r'data-asin=\"([A-Za-z0-9]{10})\"',\n            r\"\
          data-asin='([A-Za-z0-9]{10})'\",\n            r'/dp/([A-Za-z0-9]{10})',\n\
          \            r'/gp/product/([A-Za-z0-9]{10})'\n        ]\n        for pattern\
          \ in fallback_patterns:\n            found_asins.extend(re.findall(pattern,\
          \ cleaned, flags=re.IGNORECASE))\n\n    # 重複除去（B0フィルタなし：紙書籍もKindle本も対象）\n\
          \    unique_asins = []\n    for asin in found_asins:\n        asin = asin.strip().upper()\n\
          \        if len(asin) == 10 and asin not in unique_asins:\n            unique_asins.append(asin)\n\
          \n    limited_asins = unique_asins[:20]\n\n    return {\n        \"asin_query\"\
          : \",\".join(limited_asins),\n        \"count\": len(limited_asins)\n  \
          \  }\n"
        code_language: python3
        outputs:
