    - data:
        code: "import re\n\ndef main(detailed_plot_text):\n    # LLM出力が dict の場合にも対応\n\
          \    if isinstance(detailed_plot_text, dict):\n        text = detailed_plot_text.get(\"\
          text\", \"\")\n    elif isinstance(detailed_plot_text, str):\n        text\
          \ = detailed_plot_text\n    else:\n        text = \"\"\n\n    if not text.strip():\n\
          \        return {\"report_markdown\": \"\"}\n\n    src = text.replace(\"\
          \\r\\n\", \"\\n\").replace(\"\\r\", \"\\n\").strip()\n\n    # Markdown装飾を除去\n\
          \    src = re.sub(r\"\\*\\*(.*?)\\*\\*\", r\"\\1\", src)   # **bold**\n\
          \    src = re.sub(r\"__(.*?)__\", r\"\\1\", src)       # __bold__\n    src\
          \ = re.sub(r\"^\\s*#{1,6}\\s*\", \"\", src, flags=re.MULTILINE)  # # 見出し\n\
          \    src = re.sub(r\"`+\", \"\", src)                 # backticks\n\n  \
          \  lines = src.split(\"\\n\")\n    output = []\n\n    for line in lines:\n\
          \        stripped = line.strip()\n\n        if not stripped:\n         \
          \   output.append(\"\")\n            continue\n\n        # 章タイトル・節・項・本文をそのまま通す\n\
          \        output.append(stripped)\n\n    report_markdown = \"\\n\".join(output)\n\
          \    report_markdown = re.sub(r\"\\n{3,}\", \"\\n\\n\", report_markdown).strip()\n\
          \n    return {\"report_markdown\": report_markdown}"
        code_language: python3
        outputs:
